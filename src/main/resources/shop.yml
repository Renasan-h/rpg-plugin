shop:
  title: "<gold>RPG SHOP</gold>"
  # sizeは9の倍数であること
  size: 45

  categories:
    weapon:
      slot: 10
      icon: IRON_SWORD
      name: "<gold>武器</gold>"
      items:
        wooden_sword_dev1:
          itemId: wooden_sword_dev1
          slot: 10
          price: 100
          sellPrice: 30
          amount: 1
        wooden_sword_dev2:
          itemId: wooden_sword_dev2
          slot: 10
          price: 100000
          sellPrice: 30
          amount: 1
        iron_sword:
          itemId: iron_sword
          slot: 10
          price: 100
          sellPrice: 30
          amount: 1

        vip_sword:
          itemId: diamond_sword
          slot: 22
          type: ITEM
          price: 10000
          amount: 1
          permission: "rpg.shop.vip"
    defense:
      slot: 12
      icon: SHIELD
      name: "<blue>防具</blue>"
      items:
        shield:
          itemId: shield
          slot: 14
          price: 80
          amount: 1
    food:
      slot: 14
      icon: BREAD
      name: "<yellow>食料</yellow>"
      items:
        bread:
          itemId: bread
          slot: 12
          price: 10
          sellPrice: 3
          amount: 5

    potion:
      slot: 16
      icon: POTION
      name: "<#89F336>ポーション</#89F336>"
      items:
        potion:
          itemId: potion
          slot: 16
          price: 50
          amount: 1

    special:
      slot: 28
      icon: CHEST
      name: "<green>特殊</green>"
      items:
        heal_ticket:
          itemId: heal_ticket
          slot: 20
          type: COMMAND
          price: 250
          amount: 1
          commands:
            - "effect give %player% minecraft:instant_health 1 1"
            - "effect give %player% minecraft:regeneration 10 1"

        starter_set:
          itemId: starter_set
          slot: 24
          type: COMMAND
          price: 0
          amount: 1
          limit: 1
          commands:
            - "give %player% minecraft:bread 16"
            - "give %player% minecraft:stone_sword 1"